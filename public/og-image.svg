<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#7c3aed" stroke-width="0.5" opacity="0.08">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Glow orb top-right -->
  <circle cx="980" cy="120" r="200" fill="#7c3aed" opacity="0.12"/>
  <!-- Glow orb bottom-left -->
  <circle cx="220" cy="520" r="150" fill="#7c3aed" opacity="0.08"/>

  <!-- Left: Icon group -->
  <!-- Photo frame -->
  <rect x="100" y="190" width="280" height="210" rx="16" fill="none" stroke="url(#accent)" stroke-width="4" filter="url(#glow)"/>
  <!-- Inner image mockup: sky gradient -->
  <rect x="116" y="206" width="248" height="178" rx="8" fill="#1e1035"/>
  <!-- Mountain silhouette -->
  <polygon points="116,384 180,300 230,340 280,280 364,384" fill="#2d1b69" opacity="0.9"/>
  <!-- Sun -->
  <circle cx="160" cy="240" r="22" fill="#7c3aed" opacity="0.9" filter="url(#glow)"/>
  <!-- Resolution label on image -->
  <rect x="222" y="352" width="126" height="24" rx="4" fill="#7c3aed" opacity="0.85"/>
  <text x="285" y="369" font-family="monospace" font-size="12" fill="white" text-anchor="middle">1920 × 1080</text>

  <!-- Lightning bolt (spark) -->
  <polygon points="430,155 390,255 420,255 375,355 465,225 430,225" fill="url(#accent)" filter="url(#softglow)" opacity="0.95"/>

  <!-- Right: Text content -->
  <!-- Brand name -->
  <text x="530" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="96" font-weight="800" fill="white" letter-spacing="-2">
    Test<tspan fill="url(#accent)">Img</tspan>
  </text>

  <!-- Tagline -->
  <text x="532" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="400" fill="#a78bfa" opacity="0.9">
    Create test images by size or resolution
  </text>

  <!-- Feature pills -->
  <rect x="532" y="370" width="148" height="40" rx="20" fill="#7c3aed" opacity="0.25" stroke="#7c3aed" stroke-width="1"/>
  <text x="606" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#c4b5fd" text-anchor="middle">Resolution</text>

  <rect x="694" y="370" width="130" height="40" rx="20" fill="#7c3aed" opacity="0.25" stroke="#7c3aed" stroke-width="1"/>
  <text x="759" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#c4b5fd" text-anchor="middle">File Size</text>

  <rect x="838" y="370" width="110" height="40" rx="20" fill="#7c3aed" opacity="0.25" stroke="#7c3aed" stroke-width="1"/>
  <text x="893" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#c4b5fd" text-anchor="middle">Free</text>

  <!-- Bottom domain placeholder -->
  <text x="532" y="470" font-family="monospace" font-size="20" fill="#6d28d9" opacity="0.7">testimg.art</text>

  <!-- Bottom border accent -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)" opacity="0.6"/>
</svg>
