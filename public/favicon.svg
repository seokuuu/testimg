<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#171717"/>
  <!-- Photo frame -->
  <rect x="4" y="7" width="24" height="18" rx="2" fill="none" stroke="#7c3aed" stroke-width="2"/>
  <!-- Mountain/image placeholder -->
  <polyline points="4,21 10,14 15,19 19,15 28,25" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Sun/circle in corner -->
